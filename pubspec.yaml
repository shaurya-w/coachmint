name: my_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # Add these dependencies for Supabase and environment variables
  supabase_flutter: ^2.8.0
  flutter_dotenv: ^6.0.0
  url_launcher: ^6.3.1 # Add this line

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # Register the .env file as an asset
  assets:
    - .env